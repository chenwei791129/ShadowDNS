# MkDocs configuration for the ShadowDNS manual site.
# Local preview: make docs-serve (http://127.0.0.1:8000)
# Bilingual via mkdocs-static-i18n (suffix structure): `page.md` is the
# English default served at the site root, `page.zh.md` is Traditional
# Chinese under /zh/.
site_name: ShadowDNS
site_url: https://shadowdns.awei.one/
site_description: Authoritative DNS server with first-class zone aliasing for memory-efficient backup-domain serving
repo_url: https://github.com/chenwei791129/ShadowDNS
repo_name: chenwei791129/ShadowDNS
docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    # Render top-level nav groups as expanded sidebar sections (MetalLB-style layout)
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Declaring `plugins` disables the implicit default, so `search` must be
# re-listed explicitly. The i18n plugin also auto-wires Material's language
# selector (extra.alternate) — no manual switcher config needed.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          name: English
          build: true
          default: true
        # Locale `zh` keeps the URL prefix short (/zh/); Material UI strings
        # are forced to zh-TW since plain `zh` would mean Simplified Chinese.
        - locale: zh
          name: 正體中文
          build: true
          theme:
            language: zh-TW
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: deep purple
                accent: deep purple
                toggle:
                  icon: material/weather-night
                  name: 切換為深色模式
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: deep purple
                accent: deep purple
                toggle:
                  icon: material/weather-sunny
                  name: 切換為淺色模式
          nav_translations:
            Home: 首頁
            Getting Started: 入門
            Quick Start: 快速開始
            Installation: 安裝
            Configuration: 設定
            named.conf Compatibility: named.conf 相容性
            GeoIP Databases: GeoIP 資料庫
            Reference: 參考
            CLI Reference: CLI 參考
            Feature Guides: 功能指南
            How Zone Aliasing Works: Zone Aliasing 原理
            CNAME Chain Collapsing: CNAME 鏈收合
            DNS-over-HTTPS (DoH): DNS-over-HTTPS (DoH)
            Operations: 維運
            Migrating from BIND: 從 BIND 遷移
            Monitoring: 監控
            Startup Performance Benchmark: 啟動效能基準

markdown_extensions:
  - admonition
  - attr_list
  - tables
  # Unicode-aware slugify so CJK headings get usable anchors
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started.md
      - Installation: installation.md
  - Configuration:
      - named.conf Compatibility: configuration/named-conf.md
      - shadowdns.yaml: configuration/shadowdns-yaml.md
      - GeoIP Databases: configuration/geoip.md
  - Reference:
      - CLI Reference: reference/cli.md
  - Feature Guides:
      - How Zone Aliasing Works: guides/zone-aliasing.md
      - CNAME Chain Collapsing: guides/cname-chain-collapsing.md
      - EDNS Client Subnet (ECS): guides/ecs.md
      - DNS-over-HTTPS (DoH): guides/doh.md
      - Ephemeral TXT API: ephemeral-api.md
  - Operations:
      - Migrating from BIND: migration.md
      - Monitoring: operations/monitoring.md
      - Startup Performance Benchmark: benchmark.md
