# MkDocs configuration for the ShadowDNS manual site.
# Local preview: make docs-serve (http://127.0.0.1:8000)
# Bilingual via mkdocs-static-i18n (suffix structure): `page.md` is the
# zh-TW default served at the site root, `page.en.md` is English under /en/.
site_name: ShadowDNS
site_url: https://chenwei791129.github.io/ShadowDNS/
site_description: Authoritative DNS server with first-class zone aliasing for memory-efficient backup-domain serving
repo_url: https://github.com/chenwei791129/ShadowDNS
repo_name: chenwei791129/ShadowDNS
docs_dir: docs

theme:
  name: material
  language: zh-TW
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    # Render top-level nav groups as expanded sidebar sections (MetalLB-style layout)
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: 切換為深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: 切換為淺色模式

# Declaring `plugins` disables the implicit default, so `search` must be
# re-listed explicitly. The i18n plugin also auto-wires Material's language
# selector (extra.alternate) — no manual switcher config needed.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh-TW
          name: 正體中文
          build: true
          default: true
        - locale: en
          name: English
          build: true
          theme:
            language: en
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: deep purple
                accent: deep purple
                toggle:
                  icon: material/weather-night
                  name: Switch to dark mode
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: deep purple
                accent: deep purple
                toggle:
                  icon: material/weather-sunny
                  name: Switch to light mode
          nav_translations:
            首頁: Home
            入門: Getting Started
            快速開始: Quick Start
            安裝: Installation
            設定: Configuration
            named.conf 相容性: named.conf Compatibility
            GeoIP 資料庫: GeoIP Databases
            參考: Reference
            CLI 參考: CLI Reference
            功能指南: Feature Guides
            Zone Aliasing 原理: How Zone Aliasing Works
            維運: Operations
            從 BIND 遷移: Migrating from BIND
            啟動效能基準: Startup Performance Benchmark
            設計調查: Design Surveys

markdown_extensions:
  - admonition
  - attr_list
  - tables
  # Unicode-aware slugify so CJK headings get usable anchors
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首頁: index.md
  - 入門:
      - 快速開始: getting-started.md
      - 安裝: installation.md
  - 設定:
      - named.conf 相容性: configuration/named-conf.md
      - shadowdns.yaml: configuration/shadowdns-yaml.md
      - GeoIP 資料庫: configuration/geoip.md
  - 參考:
      - CLI 參考: reference/cli.md
  - 功能指南:
      - Zone Aliasing 原理: guides/zone-aliasing.md
      - Ephemeral TXT API: ephemeral-api.md
  - 維運:
      - 從 BIND 遷移: migration.md
      - 啟動效能基準: benchmark.md
  - 設計調查:
      - CNAME Flattening: cname-flattening-implementation-survey.md
      - EDNS Client Subnet (ECS): ecs-implementation-survey.md
