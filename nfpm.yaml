# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json

name: shadowdns
arch: amd64
platform: linux
version: ${VERSION}
section: net
priority: optional
maintainer: ShadowDNS Maintainers <shadowdns@example.com>
description: |
  Authoritative DNS server with first-class zone aliasing for
  memory-efficient backup-domain serving.
vendor: ShadowDNS
homepage: https://github.com/chenwei791129/ShadowDNS
license: TBD

contents:
  # Binary (linux/amd64 cross-compiled by `make build-linux`)
  - src: ./bin/shadowdns-linux-amd64
    dst: /usr/bin/shadowdns
    file_info:
      mode: 0755

  # systemd service unit
  - src: ./packaging/shadowdns.service
    dst: /lib/systemd/system/shadowdns.service

  # Example configuration files
  - src: ./packaging/named.conf.example
    dst: /etc/shadowdns/named.conf.example

  - src: ./packaging/shadowdns.yaml.example
    dst: /etc/shadowdns/shadowdns.yaml.example

scripts:
  postinstall: ./packaging/postinstall.sh
